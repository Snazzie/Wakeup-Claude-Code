name: Claude 5-Hour Sync
on:
  schedule:
    - cron: '1 1-23/5 * * *'
  workflow_dispatch:

# --- ADD THIS BLOCK ---
permissions:
  id-token: write  # Required for OIDC authentication
  contents: write  # Required if you want Claude to commit changes
  pull-requests: write # Required if you want Claude to comment on PRs
# ----------------------

jobs:
  claude-automation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Claude Code (Haiku)
        uses: anthropics/claude-code-action@v1
        with:
          # Ensure this secret is set in your Repo Settings
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Analyze recent repo activity and summarize changes."
          claude_args: "--model haiku --max-turns 5"
